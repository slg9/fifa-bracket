    <script>
      (() => {
        const origin = 'https://brakup.app'
        const isEn = location.pathname === '/en' || location.pathname.startsWith('/en/')
        const isChallengeGuide = location.pathname === '/challenge/faq'
          || location.pathname === '/en/challenge/faq'
        const isChallenge = isChallengeGuide
          || location.pathname === '/challenge'
          || location.pathname === '/en/challenge'
          || new URLSearchParams(location.search).has('challenge')
        const meta = isEn ? (isChallengeGuide ? {
          lang: 'en',
          locale: 'en_US',
          canonical: `${origin}/en/challenge/faq`,
          title: 'How to play Brakup Challenge - World Cup 2026 FAQ',
          description: 'Learn how to play Brakup Challenge, build your World Cup 2026 bracket, score points, save your prediction and challenge friends.',
          imageAlt: 'Brakup Challenge - how to play and FAQ',
          alternateFr: `${origin}/challenge/faq`,
          alternateEn: `${origin}/en/challenge/faq`,
          alternateDefault: `${origin}/challenge/faq`,
        } : isChallenge ? {
          lang: 'en',
          locale: 'en_US',
          canonical: `${origin}/en/challenge`,
          title: 'Brakup Challenge – Build your World Cup 2026 bracket',
          description: 'Start your Brakup Challenge: build your World Cup 2026 bracket, challenge friends, predict matches and try to finish first.',
          imageAlt: 'Brakup Challenge - World Cup 2026',
          alternateFr: `${origin}/challenge`,
          alternateEn: `${origin}/en/challenge`,
          alternateDefault: `${origin}/challenge`,
        } : {
          lang: 'en',
          locale: 'en_US',
          canonical: `${origin}/en`,
          title: 'Brakup – World Cup 2026 game, bracket and football mini-games',
          description: 'Build your World Cup 2026 bracket, predict scores, play arcade football mini-games and share your challenge with friends.',

          alternateFr: `${origin}/`,
          alternateEn: `${origin}/en`,
          alternateDefault: `${origin}/`,
        }) : (isChallengeGuide ? {
          lang: 'fr',
          locale: 'fr_FR',
          canonical: `${origin}/challenge/faq`,
          title: 'Comment jouer au Brakup Challenge - FAQ Coupe du Monde 2026',
          description: 'Decouvre comment jouer au Brakup Challenge, creer ton bracket Coupe du Monde 2026, marquer des points, sauvegarder ton prono et defier tes amis.',
          imageAlt: 'Brakup Challenge - comment jouer et FAQ',
          alternateFr: `${origin}/challenge/faq`,
          alternateEn: `${origin}/en/challenge/faq`,
          alternateDefault: `${origin}/challenge/faq`,
        } : isChallenge ? {
          lang: 'fr',
          locale: 'fr_FR',
          canonical: `${origin}/challenge`,
          title: 'Brakup Challenge – Crée ton bracket Coupe du Monde 2026',

        } : {

          description: 'Crée ton bracket Coupe du Monde 2026, prédis les scores, joue des mini-jeux foot arcade et partage ton challenge avec tes amis.',
          imageAlt: 'Brakup - jeu Coupe du Monde 2026',
          alternateFr: `${origin}/`,
          alternateEn: `${origin}/en`,
          alternateDefault: `${origin}/`,
        })
        const setAttr = (selector, attr, value) => {
          const node = document.head.querySelector(selector)
          if (node) node.setAttribute(attr, value)
        }
        document.documentElement.lang = meta.lang
        document.title = meta.title
        setAttr('meta[name="description"]', 'content', meta.description)
        setAttr('link[rel="canonical"]', 'href', meta.canonical)
        setAttr('meta[property="og:locale"]', 'content', meta.locale)
        setAttr('meta[property="og:url"]', 'content', meta.canonical)
        setAttr('meta[property="og:title"]', 'content', meta.title)
        setAttr('meta[property="og:description"]', 'content', meta.description)
        setAttr('meta[property="og:image:alt"]', 'content', meta.imageAlt)
        setAttr('meta[name="twitter:title"]', 'content', meta.title)
        setAttr('meta[name="twitter:description"]', 'content', meta.description)
        setAttr('meta[name="twitter:image:alt"]', 'content', meta.imageAlt)
        setAttr('link[rel="alternate"][hreflang="fr"]', 'href', meta.alternateFr)
        setAttr('link[rel="alternate"][hreflang="en"]', 'href', meta.alternateEn)
        setAttr('link[rel="alternate"][hreflang="x-default"]', 'href', meta.alternateDefault)
