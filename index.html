    <!-- ── Structured Data ───────────────────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Brakup",
        "url": "https://brakup.app/",
        "description": "Brakup est le jeu de prédiction de la Coupe du Monde 2026 : crée ton bracket, joue les matchs en mini-jeu arcade, trouve les scores exacts et les buteurs, puis affronte les autres fans au classement.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web",
        "inLanguage": ["fr", "en"],
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "EUR"
        },
        "screenshot": "https://brakup.app/og-image.png",
        "about": {
          "@type": "SportsEvent",
          "name": "FIFA World Cup 2026",
          "startDate": "2026-06-11",
          "endDate": "2026-07-19",
          "location": {
            "@type": "Place",
            "name": "USA / Canada / Mexique"
          }
        }
      }
    </script>
    <script>
      (() => {
        const origin = 'https://brakup.app'
        const isEn = location.pathname === '/en' || location.pathname.startsWith('/en/')
        const meta = isEn ? {
          lang: 'en',
          locale: 'en_US',
          canonical: `${origin}/en`,
          title: 'Brakup — World Cup 2026 Challenge | Predictions, bracket & football mini-game',
          description: 'Brakup is the World Cup 2026 prediction game: build your bracket, play arcade football matches, hit exact scores and scorers, then climb the live leaderboard.',
          imageAlt: 'Brakup — World Cup 2026 Challenge',
        } : {
          lang: 'fr',
          locale: 'fr_FR',
          canonical: `${origin}/`,
          title: 'Brakup — Coupe du Monde 2026 Challenge | Prédictions, bracket & mini-jeu foot',
          description: 'Brakup est le jeu de prédiction de la Coupe du Monde 2026 : crée ton bracket, joue les matchs en mini-jeu arcade, trouve les scores exacts, les buteurs et grimpe dans le classement.',
          imageAlt: 'Brakup — Coupe du Monde 2026 Challenge',
        }
        const setAttr = (selector, attr, value) => {
          const node = document.head.querySelector(selector)
          if (node) node.setAttribute(attr, value)
        }
        document.documentElement.lang = meta.lang
        document.title = meta.title
        setAttr('meta[name="description"]', 'content', meta.description)
        setAttr('link[rel="canonical"]', 'href', meta.canonical)
        setAttr('meta[property="og:locale"]', 'content', meta.locale)
        setAttr('meta[property="og:url"]', 'content', meta.canonical)
        setAttr('meta[property="og:title"]', 'content', meta.title)
        setAttr('meta[property="og:description"]', 'content', meta.description)
        setAttr('meta[property="og:image:alt"]', 'content', meta.imageAlt)
        setAttr('meta[name="twitter:title"]', 'content', meta.title)
        setAttr('meta[name="twitter:description"]', 'content', meta.description)
        setAttr('meta[name="twitter:image:alt"]', 'content', meta.imageAlt)
      })()
    </script>
